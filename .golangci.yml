version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - modernize

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - unnamedResult
        - rangeValCopy
        - importShadow
        - commentedOutCode
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - io.Copy
        - encoding/json.Unmarshal
        - gopkg.in/yaml.v3.Unmarshal
        - fmt.Sscanf
        - fmt.Scanln

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: archive\.go
        text: "zr.Close"
        linters:
          - errcheck
